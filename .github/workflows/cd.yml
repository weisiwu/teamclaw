name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  APP_NAME: teamclaw
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SERVER_PATH: ${{ secrets.SERVER_PATH }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build Server
        run: |
          cd server && npm ci --legacy-peer-deps && npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          cp -r .next deploy-package/
          cp -r server/dist deploy-package/server/
          cp -r server/node_modules deploy-package/server/
          cp -r public deploy-package/
          cp package.json deploy-package/
          cp -r server/package.json deploy-package/server/
          cp docker-compose.yml deploy-package/
          cp Dockerfile deploy-package/
          cp -r deploy deploy-package/
          cp -r scripts deploy-package/
          cp .env.production deploy-package/.env
          tar -czf deployment-package.tar.gz -C deploy-package .

      - name: Deploy to server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "deployment-package.tar.gz"
          target: "${{ secrets.SERVER_PATH }}"
          strip_components: 0
          overwrite: true

      - name: Run remote deploy script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.SERVER_PATH }}
            tar -xzf deployment-package.tar.gz
            cd deploy-package
            docker-compose -f docker-compose.yml pull
            docker-compose -f docker-compose.yml up -d --build
            docker image prune -f
            echo "Deployment completed at $(date)"

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Notify failure
        if: needs.deploy.result != 'success'
        run: |
          echo "Deployment failed. Please check the logs."

      - name: Success notification
        if: needs.deploy.result == 'success'
        run: |
          echo "Deployment successful!"
